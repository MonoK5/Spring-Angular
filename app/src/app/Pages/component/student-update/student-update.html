<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="max-w-sm mx-auto mt-6 pt-6"
  novalidate
>
  <div>
    <label
      for="studentSelect"
      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
      >Select Student</label
    >
    <select
      id="studentSelect"
      (change)="onStudentSelectEvent($event)"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
    >
      <option value="">Select a student</option>
      <option *ngFor="let s of students" [value]="s.id">{{ s.name }}</option>
    </select>
  </div>
  <div class="mb-5 pt-5">
    <label
      for="id"
      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
      >Student ID</label
    >
    <input
      type="text"
      id="id"
      formControlName="id"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      required
    />
  </div>

  <div class="mb-5">
    <label
      for="name"
      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
      >Student Name</label
    >
    <input
      type="text"
      id="name"
      formControlName="name"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      required
    />
    <div
      *ngIf="form.get('name')?.touched && form.get('name')?.invalid"
      class="text-red-600 mt-1 text-sm"
    >
      <div *ngIf="form.get('name')?.errors?.['required']">
        Name is required.
      </div>
      <div *ngIf="form.get('name')?.errors?.['minlength']">
        Name must be at least 3 characters.
      </div>
    </div>
  </div>

  <div class="mb-5">
    <label
      for="score"
      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
      >Student Marks</label
    >
    <input
      type="number"
      id="score"
      formControlName="score"
      min="0"
      max="100"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      required
    />
    <div
      *ngIf="form.get('score')?.touched && form.get('score')?.invalid"
      class="text-red-600 mt-1 text-sm"
    >
      <div *ngIf="form.get('score')?.errors?.['required']">
        Please enter a mark.
      </div>
      <div *ngIf="form.get('score')?.errors?.['min']">
        Score cannot be less than 0.
      </div>
      <div *ngIf="form.get('score')?.errors?.['max']">
        Score cannot be more than 100.
      </div>
    </div>
  </div>

  <div class="mb-5">
    <label
      for="grade"
      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
      >Student Grade</label
    >
    <input
      type="text"
      id="grade"
      formControlName="grade"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      required
    />
    <div
      *ngIf="form.get('grade')?.touched && form.get('grade')?.invalid"
      class="text-red-600 mt-1 text-sm"
    >
      Grade is required.
    </div>
  </div>

  <div class="mt-6 flex items-center justify-end gap-x-6">
    <button
      type="button"
      class="rounded-md bg-gradient-to-r from-cyan-400 via-cyan-500 to-cyan-600  px-3 py-2 text-sm font-semibold text-white shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
      (click)="close.emit()"
    >
      Cancel
    </button>
    <button
      type="submit"
      class="rounded-md bg-gradient-to-r from-cyan-400 via-cyan-500 to-cyan-600 hover:bg-gradient-to-br  px-3 py-2 text-sm font-semibold text-white shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
    >
      Save
    </button>
  </div>
</form>

<div *ngIf="message" class="mt-4 text-purple-700 ">{{ message }}</div>

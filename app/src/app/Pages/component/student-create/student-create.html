<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaper Admin Panel - Student Form</title>
   
</head>
<body>
    <div class="form-container">
        <h2>Student Form</h2>
        <form>
            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" name="studentId" required>
            </div>
            <div class="form-group">
                <label for="studentName">Student Name</label>
                <input type="text" id="studentName" name="studentName" required>
            </div>
            <div class="form-group">
                <label for="studentMarks">Student Marks</label>
                <input type="number" id="studentMarks" name="studentMarks" required min="0" max="100">
            </div>
            <div class="form-group">
                <label for="studentGrade">Student Grade</label>
                <input type="text" id="studentGrade" name="studentGrade" required>
            </div>
            <div class="button-group">
                <button type="submit">Add</button>
                <button type="button" onclick="document.getElementById('myForm').reset()">Reset</button>
                <button type="button">Back</button>
            </div>
        </form>
      
    </div>
</body>
</html>

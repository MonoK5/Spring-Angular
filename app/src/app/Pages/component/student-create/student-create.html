<!-- Main Content -->
<div class="flex-1 flex flex-col">
    <!-- Top Navbar -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-purple-700">Add Student</h1>
    </header>

    <div class="flex items-center justify-center min-h-screen bg-gray-50">
  <div class="container flex-1 max-w-lg p-6 bg-white rounded shadow-md">
    <h2 class="heading text-center mb-4">Add New Student</h2>
    <form [formGroup]="form" (ngSubmit)="getNewStudent()">
      <div class="form-group mb-4">
        <label for="name" class="block mb-1 font-medium">Name</label>
        <input
          type="text"
          class="form-control w-full border border-gray-300 rounded px-3 py-2"
          id="name"
          formControlName="name"
        />
        <div
          *ngIf="form.get('name')?.touched && form.get('name')?.invalid"
          class="text-red-500 text-sm mt-1"
        >
          <div *ngIf="form.get('name')?.errors?.['required']">
            Name is required.
          </div>
          <div *ngIf="form.get('name')?.errors?.['minlength']">
            Name must be at least 3 characters.
          </div>
          <div *ngIf="form.get('name')?.errors?.['pattern']">
          Only letters are allowed.
          </div>
        </div>
      </div>

      <div class="form-group mb-4">
        <label for="score" class="block mb-1 font-medium">Marks</label>
        <input
          type="number"
          class="form-control w-full border border-gray-300 rounded px-3 py-2"
          id="score"
          formControlName="score"
        />
        <div
          *ngIf="form.get('score')?.touched && form.get('score')?.invalid"
          class="text-red-500 text-sm mt-1"
        >
          <div *ngIf="form.get('score')?.errors?.['required']">
            Please enter a mark.
          </div>
          <div *ngIf="form.get('score')?.errors?.['min']">
            Score cannot be less than 0.
          </div>
          <div *ngIf="form.get('score')?.errors?.['max']">
            Score cannot be more than 100.
          </div>
        </div>
      </div>

      <div class="form-group mb-6">
        <label for="grade" class="block mb-1 font-medium">Grade</label>
        <input
          type="text"
          class="form-control w-full border border-gray-300 rounded px-3 py-2"
          id="grade"
          formControlName="grade"
        />
        <div
          *ngIf="form.get('grade')?.invalid && form.get('grade')?.touched"
          class="text-red-500 text-sm mt-1"
        >
          Grade is required.
        </div>
      </div>

      <div class="flex justify-between">
        <button type="submit" class="btn btn-submit bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Submit</button>
        <button type="button" class="btn btn-reset bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600" (click)="resetAddStudentForm()">
          Reset
        </button>
        <button type="button" class="btn btn-back bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600" (click)="navigateToMain()">
          Back
        </button>
      </div>
    </form>
  </div>
</div>
